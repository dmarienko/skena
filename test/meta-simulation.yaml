name: Meta.Heritage.cusum_005_wwfl_001

strategy: MetaTraderLeverage

description:
  - Meta strategy combining 4 weighted models

parameters:
  universe_schedule: "SUN @ 23:59"
  model_check_interval: 1d
  reset_universe_policy: "wait_for_close"

  max_signal_value: 2.0

  enable_probability_scaling: true
  probability_scaling_factor: 3.0
  enable_signal_scaling: true
  model_entry_threshold: 0.8
  model_cancel_threshold: 0.5

  forecast_sma_period: 168 # - SMA period for forecast smoothing 7 x 24 = 7 days
  max_forecast: 3.0        # - GLOBAL maximum forecast clipping (after aggregation, lean naming)
  fdm_min_observations: 20 # - minimum observations for FDM calculation

  target_risk: 1.2
  max_symbol_leverage: 0.2
  max_total_leverage: 1.5
  buffer: 0.1
  buffering_method: leverage
  scale_out: false
