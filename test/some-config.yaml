name: Meta.Heritage15m.cs005
description:
  - Meta strategy — HeritageReverseStrategy 15min, CUSUM 0.05 targets
  - Two alpha nodes (Long + Short), equal weights 1.0
  - RandomForest 500 estimators, ECDF transform, weekly walk-forward retrain
  - Entry threshold 0.8, cancel 0.5, leverage-based sizing
  - Backtest period matches model evaluation window (2025-01-01 to 2025-06-01)
  - Universe — BTCUSDT + ETHUSDT (Binance UM)

strategy: xmetals.reversion.meta.metatrader0.MetaTraderLeverage

tags:
  - meta
  - heritage
  - 15min
  - cusum005
  - separated

parameters:
  max_signal_value: 2.0

  enable_probability_scaling: true
  probability_scaling_factor: 3.0
  enable_signal_scaling: true
  model_entry_threshold: 0.8
  model_cancel_threshold: 0.5

  forecast_sma_period: 672 
  max_forecast: 3.0
  fdm_min_observations: 20

  target_risk: 1.2
  max_symbol_leverage: 0.2
  max_total_leverage: 1.5
  buffer: 0.1
  buffering_method: leverage
  scale_out: false
