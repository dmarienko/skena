<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- - neon cyanâ†’magenta marketplace icon (source for icons/icon.png) -->
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#3fd2ff"/>
      <stop offset="50%" stop-color="#7a63ff"/>
      <stop offset="100%" stop-color="#f43fd9"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4.5"/>
    </filter>
  </defs>

  <rect width="256" height="256" fill="#070b14"/>

  <!-- - glow layer: blurred duplicate under the crisp lines -->
  <g stroke="url(#neon)" fill="none" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)" opacity="0.85">
    <path d="M 62,36 L 194,36 L 220,62 L 220,194 L 194,220 L 62,220 L 36,194 L 36,62 Z"
          stroke-width="6" pathLength="1000" stroke-dasharray="120 10 200 10 310 10 340"/>
    <path d="M 68,46 L 188,46 L 210,68 L 210,188 L 188,210 L 68,210 L 46,188 L 46,68 Z" stroke-width="3"/>
    <path d="M 146,60 L 92,138 L 120,138 L 110,196 L 164,118 L 136,118 Z" stroke-width="6"/>
  </g>

  <!-- - crisp lines -->
  <g stroke="url(#neon)" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <path d="M 62,36 L 194,36 L 220,62 L 220,194 L 194,220 L 62,220 L 36,194 L 36,62 Z"
          stroke-width="4" pathLength="1000" stroke-dasharray="120 10 200 10 310 10 340"/>
    <path d="M 68,46 L 188,46 L 210,68 L 210,188 L 188,210 L 68,210 L 46,188 L 46,68 Z" stroke-width="2"/>
    <path d="M 146,60 L 92,138 L 120,138 L 110,196 L 164,118 L 136,118 Z" stroke-width="4.5"/>
  </g>
</svg>
