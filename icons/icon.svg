<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="#0D1117"/>

  <!-- Subtle grid dots -->
  <g fill="#1E2D3D" opacity="0.6">
    <circle cx="20" cy="20" r="1.2"/>
    <circle cx="40" cy="20" r="1.2"/>
    <circle cx="60" cy="20" r="1.2"/>
    <circle cx="80" cy="20" r="1.2"/>
    <circle cx="100" cy="20" r="1.2"/>
    <circle cx="108" cy="20" r="1.2"/>
    <circle cx="20" cy="40" r="1.2"/>
    <circle cx="40" cy="40" r="1.2"/>
    <circle cx="60" cy="40" r="1.2"/>
    <circle cx="80" cy="40" r="1.2"/>
    <circle cx="100" cy="40" r="1.2"/>
    <circle cx="108" cy="40" r="1.2"/>
    <circle cx="20" cy="60" r="1.2"/>
    <circle cx="40" cy="60" r="1.2"/>
    <circle cx="60" cy="60" r="1.2"/>
    <circle cx="80" cy="60" r="1.2"/>
    <circle cx="100" cy="60" r="1.2"/>
    <circle cx="108" cy="60" r="1.2"/>
    <circle cx="20" cy="80" r="1.2"/>
    <circle cx="40" cy="80" r="1.2"/>
    <circle cx="60" cy="80" r="1.2"/>
    <circle cx="80" cy="80" r="1.2"/>
    <circle cx="100" cy="80" r="1.2"/>
    <circle cx="108" cy="80" r="1.2"/>
    <circle cx="20" cy="100" r="1.2"/>
    <circle cx="40" cy="100" r="1.2"/>
    <circle cx="60" cy="100" r="1.2"/>
    <circle cx="80" cy="100" r="1.2"/>
    <circle cx="100" cy="100" r="1.2"/>
    <circle cx="108" cy="100" r="1.2"/>
    <circle cx="20" cy="108" r="1.2"/>
    <circle cx="40" cy="108" r="1.2"/>
    <circle cx="60" cy="108" r="1.2"/>
    <circle cx="80" cy="108" r="1.2"/>
    <circle cx="100" cy="108" r="1.2"/>
    <circle cx="108" cy="108" r="1.2"/>
  </g>

  <!-- Edges — glowing cyan lines -->
  <g opacity="0.55">
    <!-- top-left → top-right -->
    <line x1="38" y1="38" x2="90" y2="34" stroke="#38BDF8" stroke-width="1.8" stroke-linecap="round"/>
    <!-- top-left → bottom-centre -->
    <line x1="36" y1="42" x2="56" y2="84" stroke="#38BDF8" stroke-width="1.8" stroke-linecap="round"/>
    <!-- top-right → bottom-centre -->
    <line x1="88" y1="38" x2="60" y2="84" stroke="#38BDF8" stroke-width="1.8" stroke-linecap="round"/>
    <!-- bottom-centre → bottom-right -->
    <line x1="66" y1="90" x2="96" y2="94" stroke="#6EE7B7" stroke-width="1.8" stroke-linecap="round"/>
    <!-- top-right → bottom-right -->
    <line x1="94" y1="40" x2="98" y2="88" stroke="#6EE7B7" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="3 3"/>
  </g>

  <!-- Node: top-left — file/markdown node (blue) -->
  <rect x="18" y="22" width="36" height="28" rx="5" fill="#1C3252" stroke="#3B82F6" stroke-width="1.5"/>
  <line x1="24" y1="32" x2="48" y2="32" stroke="#7CA9F0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="38" x2="44" y2="38" stroke="#7CA9F0" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="24" y1="43" x2="40" y2="43" stroke="#7CA9F0" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>

  <!-- Node: top-right — code node (green accent) -->
  <rect x="74" y="18" width="36" height="28" rx="5" fill="#102820" stroke="#34D399" stroke-width="1.5"/>
  <line x1="80" y1="28" x2="96" y2="28" stroke="#6EE7B7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="80" y1="34" x2="104" y2="34" stroke="#6EE7B7" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="80" y1="39" x2="100" y2="39" stroke="#6EE7B7" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>

  <!-- Node: bottom-centre — notebook output (purple/chart) -->
  <rect x="44" y="74" width="38" height="34" rx="5" fill="#1A1030" stroke="#A78BFA" stroke-width="1.5"/>
  <!-- mini chart bars -->
  <rect x="50" y="96" width="4" height="6" rx="1" fill="#A78BFA" opacity="0.9"/>
  <rect x="56" y="90" width="4" height="12" rx="1" fill="#A78BFA" opacity="0.9"/>
  <rect x="62" y="93" width="4" height="9" rx="1" fill="#C084FC" opacity="0.9"/>
  <rect x="68" y="86" width="4" height="16" rx="1" fill="#A78BFA" opacity="0.9"/>

  <!-- Node: bottom-right — text node (orange) -->
  <rect x="84" y="78" width="30" height="26" rx="5" fill="#1F1510" stroke="#F59E0B" stroke-width="1.5"/>
  <line x1="90" y1="87" x2="108" y2="87" stroke="#FBD167" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
  <line x1="90" y1="92" x2="106" y2="92" stroke="#FBD167" stroke-width="1.1" stroke-linecap="round" opacity="0.5"/>
  <line x1="90" y1="97" x2="102" y2="97" stroke="#FBD167" stroke-width="1.1" stroke-linecap="round" opacity="0.3"/>

  <!-- Arrow head on bottom-centre → bottom-right edge -->
  <polygon points="92,93 86,90 86,96" fill="#6EE7B7" opacity="0.55"/>
</svg>
